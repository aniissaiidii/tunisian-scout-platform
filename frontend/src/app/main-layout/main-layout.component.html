<div class="app-wrapper">
  <header class="navbar">
    <div class="navbar-content">
      <div class="navbar-brand" (click)="navigate('/home')">
        <div class="brand-badge">TSA</div>
        <div class="brand-text">
          <span class="brand-title">Tunisian Scout Association</span>
          <span class="brand-subtitle">جمعية الكشاف التونسي</span>
        </div>
      </div>
      <nav class="nav-menu" [class.open]="menuOpen">
        <a class="nav-item" [class.active]="isActive('/home')" (click)="navigate('/home')">Home</a>
        <a class="nav-item" [class.active]="isActive('/overview')" (click)="navigate('/overview')">Dashboard</a>
        <a class="nav-item" [class.active]="isActive('/classification')" (click)="navigate('/classification')">Attendance</a>
        <a class="nav-item" [class.active]="isActive('/regression')" (click)="navigate('/regression')">Estimates</a>
        <a class="nav-item" [class.active]="isActive('/clustering')" (click)="navigate('/clustering')">Groups</a>
        <a class="nav-item" [class.active]="isActive('/forecasting')" (click)="navigate('/forecasting')">Trends</a>
        <a class="nav-item" [class.active]="isActive('/prediction')" (click)="navigate('/prediction')">Plan Activity</a>
      </nav>
      <div class="navbar-actions">
        <div id="google_translate_element" class="translate-widget"></div>
        <button class="cta-btn" (click)="logout()">🚪 Logout</button>
      </div>
      <button class="menu-toggle" (click)="toggleMenu()">☰</button>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <p>&copy; 2024 ML Dashboard | Powered by Angular & FastAPI</p>
  </footer>
</div>
