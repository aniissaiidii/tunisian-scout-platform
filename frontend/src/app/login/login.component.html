<div class="login-container">
  <div class="login-card">
    <!-- Brand section – exactly like navbar but larger and centered -->
    <div class="login-brand">
      <div class="brand-badge">TSA</div>
      <div class="brand-text">
        <span class="brand-title">Tunisian Scout Association</span>
        <span class="brand-subtitle">جمعية الكشاف التونسي</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="login-form">
      <h2>Welcome back</h2>
      <p>Sign in to continue to the dashboard</p>

      <form (ngSubmit)="login()">
        <div class="input-group">
          <input 
            type="text" 
            [(ngModel)]="username" 
            name="username"
            placeholder="Username" 
            required 
          />
        </div>
        <div class="input-group">
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password"
            placeholder="Password" 
            required 
          />
        </div>
        <button type="submit">Login →</button>
      </form>

      
    </div>
  </div>
</div>
