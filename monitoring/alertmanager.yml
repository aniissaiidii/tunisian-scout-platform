global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
      group_wait: 0s
      repeat_interval: 5m

    - match:
        severity: warning
      receiver: 'warning-receiver'
      continue: true
      group_wait: 30s

receivers:
  - name: 'default'
    # Default receiver - logs to console
    webhook_configs:
      - url: 'http://localhost:8000/api/v1/alerts'

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://localhost:8000/api/v1/alerts?severity=critical'
    
  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://localhost:8000/api/v1/alerts?severity=warning'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
